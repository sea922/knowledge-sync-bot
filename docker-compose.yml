services:
  # --------------------------------------------------------------------------
  # Prometheus — scrapes metrics from Pushgateway
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: optibot_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Pushgateway — receives metrics pushed by the batch pipeline
  # --------------------------------------------------------------------------
  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: optibot_pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Grafana — dashboard UI
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: optibot_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/pipeline.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
